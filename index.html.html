/* ── Feriados automáticos para anos sem calendário oficial ── */
function calcPascoa(ano) {
  const a = ano % 19, b = Math.floor(ano / 100), c = ano % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const mes = Math.floor((h + l - 7 * m + 114) / 31);
  const dia = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(ano, mes - 1, dia);
}

function buildFeriadosAno(ano) {
  const p = calcPascoa(ano);
  const add = (base, n) => { const r = new Date(base); r.setDate(r.getDate() + n); return r; };

    { d: new Date(ano, 0, 1),   nome: "Confraternização Universal",              tipo: "feriado"     },
    { d: new Date(ano, 3, 21),  nome: "Tiradentes",                              tipo: "feriado"     },

    { d: new Date(ano, 10, 15), nome: "Proclamação da República",                tipo: "feriado"     },
    { d: new Date(ano, 11, 25), nome: "Natal",                                   tipo: "feriado"     },
    { d: add(p, -48),           nome: "Ponto Facultativo — Carnaval (2ª)",       tipo: "facultativo" },
    { d: add(p, -47),           nome: "Ponto Facultativo — Carnaval (3ª)",       tipo: "facultativo" },
    { d: add(p, -2),            nome: "Paixão de Cristo",                        tipo: "feriado"     },
    { d: add(p, 60),            nome: "Corpus Christi",                          tipo: "facultativo" },
    { d: new Date(ano, 7, 5),   nome: "Feriado Estadual — Data Magna da Paraíba",tipo: "feriado"     },
    { d: new Date(ano, 10, 20), nome: "Consciência Negra",                       tipo: "feriado"     },
    // Recesso jan
    { d: new Date(ano, 0, 2),   nome: "Recesso Forense",                         tipo: "recesso"     },
    { d: new Date(ano, 0, 5),   nome: "Recesso Forense",                         tipo: "recesso"     },
    { d: new Date(ano, 0, 6),   nome: "Recesso Forense",                         tipo: "recesso"     },
  ];
  const map = new Map();
  lista.forEach(f => map.set(getKey(f.d), { nome: f.nome, tipo: f.tipo }));
  return map;
}

function buildFeriados(ano) {
  if (ano === 2026 || ano === 2027) return FORENSE_2026;
  // Para outros anos: mescla ano e ano+1 (para prazos de recesso)
  const m1 = buildFeriadosAno(ano);
  const m2 = buildFeriadosAno(ano + 1);
  return new Map([...m1, ...m2]);
}

function getNaoUtil(d, feriados) {
  const dow = d.getDay();
  if (dow === 0) return { motivo: "domingo", tipo: "fds" };
  if (dow === 6) return { motivo: "sábado", tipo: "fds" };
  const f = feriados.get(getKey(d));
  if (f)        return { motivo: f.nome, tipo: f.tipo };
  return null;
}

function isDiaUtil(d, feriados) { return getNaoUtil(d, feriados) === null; }

function addDiasUteis(inicio, n, feriados) {
  const d = new Date(inicio);
  let count = 0;
  while (count < n) { d.setDate(d.getDate() + 1); if (isDiaUtil(d, feriados)) count++; }
  // Prorroga se cair em dia não-útil
  while (!isDiaUtil(d, feriados)) d.setDate(d.getDate() + 1);
  return d;
}

function addDiasCorridosCivel(inicio, n, feriados) {
  const d = new Date(inicio); d.setDate(d.getDate() + n);
  while (!isDiaUtil(d, feriados)) d.setDate(d.getDate() + 1);
  return d;
}

function addDiasCorridosPenal(inicio, n) {
  const d = new Date(inicio); d.setDate(d.getDate() + n); return d;
}

const TIPO_COR = { feriado:"#B91C1C", facultativo:"#92400E", recesso:"#1E40AF", fds:"#6B7280" };
const TIPO_LABEL = { feriado:"Feriado", facultativo:"Ponto Facultativo", recesso:"Recesso Forense", fds:"Fim de semana" };

function Calculadora() {
  const [tipoId, setTipoId]   = useState("");
  const [dataStr, setDataStr] = useState("");
  const [horaStr, setHoraStr] = useState("09:00");

  const tipo = TIPOS_PRAZO.find(t => t.id === tipoId);

  const resultado = useMemo(() => {
    if (!tipo || !dataStr) return null;
    const [ano, mes, dia] = dataStr.split("-").map(Number);
    const dataBase = new Date(ano, mes - 1, dia);
    const feriados = buildFeriados(ano);

    if (tipo.tipo === "horas") {
      const [h, mi] = horaStr.split(":").map(Number);
      const dt = new Date(ano, mes - 1, dia, h, mi);
      const v  = new Date(dt.getTime() + tipo.horas * 3_600_000);
      return { modo:"horas", referencia:`${fmtC(dataBase)} às ${horaStr}`, vencimento:v,
               vencimentoTexto:`${fmtL(v)} às ${String(v.getHours()).padStart(2,"0")}:${String(v.getMinutes()).padStart(2,"0")}`,
               motivo:null, inicioContagem:null };
    }
    if (tipo.tipo === "horas_antes") {
      const [h, mi] = horaStr.split(":").map(Number);
      const sessao = new Date(ano, mes - 1, dia, h, mi);
      const limite = new Date(sessao.getTime() - tipo.horas * 3_600_000);
      return { modo:"horas_antes", referencia:`Sessão: ${fmtC(dataBase)} às ${horaStr}`, vencimento:limite,
               vencimentoTexto:`${fmtL(limite)} às ${String(limite.getHours()).padStart(2,"0")}:${String(limite.getMinutes()).padStart(2,"0")}`,
               motivo:null, inicioContagem:null };
    }

    // Início da contagem: próximo dia após a publicação
    const inicioContagem = new Date(dataBase);
    inicioContagem.setDate(inicioContagem.getDate() + 1);

    let vencimento;
    if (tipo.tipo === "uteis")    vencimento = addDiasUteis(dataBase, tipo.dias, feriados);
    else if (tipo.tipo === "corridos") vencimento = addDiasCorridosCivel(dataBase, tipo.dias, feriados);
    else                          vencimento = addDiasCorridosPenal(dataBase, tipo.dias);

    // Motivo do vencimento (feriado, recesso, etc.)
    const nu = getNaoUtil(new Date(vencimento.getTime() - 86_400_000), feriados);
    const motivoProrrogacao = (() => {
      if (tipo.tipo === "penal") return null;
      // Verifica se houve prorrogação verificando se o dia calculado não seria o vencimento original
      const vOrig = new Date(dataBase);
      if (tipo.tipo === "uteis") {
        // Calcula sem prorrogação
        let tmp = new Date(dataBase), count = 0;
        while (count < tipo.dias) { tmp.setDate(tmp.getDate() + 1); if (isDiaUtil(tmp, feriados)) count++; }
        const naoUtil = getNaoUtil(tmp, feriados);
        if (naoUtil) return naoUtil;
      } else {
        vOrig.setDate(vOrig.getDate() + tipo.dias);
        const naoUtil = getNaoUtil(vOrig, feriados);
        if (naoUtil) return naoUtil;
      }
      return null;
    })();

    return {
      modo:"dias",
      inicioContagem,
      vencimento,
      vencimentoTexto: fmtL(vencimento),
      diasTipo: tipo.tipo === "penal" ? "corridos (penal)" : tipo.tipo === "corridos" ? "corridos" : "úteis",
      qtd: tipo.dias,
      motivoProrrogacao,
      anoDados: (ano === 2026 || ano === 2027) ? "2026" : null,
    };
  }, [tipo, dataStr, horaStr]);

  const precisaHora = tipo && (tipo.tipo === "horas" || tipo.tipo === "horas_antes");
  const labelData   = tipo?.tipo === "horas_antes" ? "Data e hora da sessão" :
                      tipo?.tipo === "horas"        ? "Data e hora do protocolo / intimação" :
                      "Data da publicação / intimação";

  return (
    <div>
      <div className="section-title">Calculadora de Prazos</div>
      <div className="section-sub">
        Para 2026: usa o <strong>calendário oficial do TJPB</strong> — feriados, pontos facultativos e recesso forense.
        Para outros anos: usa feriados nacionais + estadual PB calculados automaticamente.
      </div>

      <div className="calc-card">
        <div className="rec-label">Tipo de prazo</div>
        <select className="calc-select" value={tipoId} onChange={e => setTipoId(e.target.value)}>
          <option value="">— selecione —</option>
          {GRUPOS_PRAZO.map(g => (
            <optgroup key={g} label={g}>
              {TIPOS_PRAZO.filter(t => t.grupo === g).map(t => (
                <option key={t.id} value={t.id}>{t.label}</option>
              ))}
            </optgroup>
          ))}
        </select>
        {tipo && (
          <div className="calc-tipo-info">
            <span className="chip chip-prazo">
              {tipo.tipo === "horas" || tipo.tipo === "horas_antes" ? `${tipo.horas}h`
                : `${tipo.dias} dias ${tipo.tipo === "uteis" ? "úteis" : tipo.tipo === "penal" ? "corridos (penal)" : "corridos"}`}
            </span>
            <span style={{ fontSize:11, color:"#8A9CB0", marginLeft:6 }}>{tipo.art}</span>
            {tipo.obs && <div className="alerta-box" style={{ marginTop:8 }}><div className="alerta-text">ℹ {tipo.obs}</div></div>}
          </div>
        )}
      </div>

      {tipo && (
        <div className="calc-card" style={{ marginTop:10 }}>
          <div className="rec-label">{labelData}</div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            <input type="date" className="calc-input" value={dataStr} onChange={e => setDataStr(e.target.value)} />
            {precisaHora && (
              <input type="time" className="calc-input" style={{ maxWidth:110 }} value={horaStr} onChange={e => setHoraStr(e.target.value)} />
            )}
          </div>
        </div>
      )}

      {resultado && (
        <div className="calc-resultado">
          <div className="calc-res-label">
            Vencimento do prazo
            {resultado.anoDados && <span style={{ marginLeft:8, fontSize:9, background:"#C4A454", color:"#0F2542", padding:"1px 6px", borderRadius:10, fontWeight:700 }}>TJPB 2026</span>}
          </div>
          <div className="calc-res-data">{resultado.vencimentoTexto}</div>
          <div className="calc-res-fmt">{fmtC(resultado.vencimento)}</div>

          {resultado.motivoProrrogacao && (
            <div style={{ marginTop:12, padding:"10px 12px", background:"rgba(196,164,84,0.15)", borderRadius:3, borderLeft:"3px solid #C4A454" }}>
              <div style={{ fontSize:10, letterSpacing:1.5, textTransform:"uppercase", color:"#C4A454", fontWeight:700, marginBottom:4 }}>
                {TIPO_LABEL[resultado.motivoProrrogacao.tipo] || "Não-útil"} — prazo prorrogado
              </div>
              <div style={{ fontSize:12, color:"#E8D8A0" }}>{resultado.motivoProrrogacao.motivo}</div>
            </div>
          )}

          {resultado.modo === "dias" && resultado.inicioContagem && (
            <div style={{ marginTop:12, padding:"10px 12px", background:"rgba(255,255,255,0.08)", borderRadius:3 }}>
              <div style={{ fontSize:9, letterSpacing:1.5, textTransform:"uppercase", color:"#8AAAC0", marginBottom:4 }}>Início da contagem</div>
              <div style={{ fontSize:13, color:"#E8E4DC" }}>{fmtL(resultado.inicioContagem)}</div>
              <div style={{ fontSize:11, color:"#6A8AA0", marginTop:3 }}>
                {resultado.qtd} dias {resultado.diasTipo} a partir daqui
                {resultado.tipo === "penal" ? " (sem prorrogação)" : " (com suspensão em dias não-úteis)"}
              </div>
            </div>
          )}

          {resultado.modo === "horas_antes" && (
            <div style={{ marginTop:12, padding:"10px 12px", background:"rgba(255,255,255,0.08)", borderRadius:3 }}>
              <div style={{ fontSize:9, letterSpacing:1.5, textTransform:"uppercase", color:"#8AAAC0", marginBottom:4 }}>Referência</div>
              <div style={{ fontSize:13, color:"#E8E4DC" }}>{resultado.referencia}</div>
            </div>
          )}

          {!resultado.anoDados && resultado.modo === "dias" && (
            <div style={{ marginTop:12, padding:"8px 10px", background:"rgba(255,255,255,0.06)", borderRadius:3 }}>
              <div style={{ fontSize:11, color:"#7A9AB0", lineHeight:1.5 }}>
                ⚠ Calendário estimado — pontos facultativos e recesso do TJPB não incluídos. Para datas em 2026, selecione o ano correto para usar o calendário oficial.
              </div>
            </div>
          )}
        </div>
      )}

      {/* Calendário TJPB 2026 */}
      <div className="calc-card" style={{ marginTop:18 }}>
        <div className="info-title" style={{ marginBottom:12 }}>📅 Calendário Forense TJPB 2026</div>
        <div style={{ fontSize:11, color:"#6B82A0", marginBottom:14, lineHeight:1.5 }}>
          Fonte: Calendário Oficial TJPB 2026. Inclui feriados, pontos facultativos e recesso forense.
          Feriados municipais variam por comarca — verifique no DJe.

function ModalPrompt({ titulo, texto, onClose }) {
  const [copiado, setCopiado] = useState(false);

  function copiar() {
    navigator.clipboard.writeText(texto).then(() => {
      setCopiado(true);
      setTimeout(() => setCopiado(false), 2500);
    });
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="modal-badge">Elaborar peça no Claude</div>
            <div className="modal-titulo">{titulo}</div>
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>

        <div className="modal-instrucao">
          <span className="modal-instrucao-n">1</span> Copie o prompt abaixo
          <span className="modal-instrucao-sep">→</span>
          <span className="modal-instrucao-n">2</span> Preencha os campos em colchetes com os dados do processo
          <span className="modal-instrucao-sep">→</span>
          <span className="modal-instrucao-n">3</span> Cole no Claude e envie
        </div>

        <textarea className="modal-textarea" readOnly value={texto} />

        <div className="modal-actions">
          <button className="modal-btn-copiar" onClick={copiar}>
            {copiado ? "✓ Copiado!" : "Copiar prompt"}
          </button>
          <a
            className="modal-btn-claude"
            href="https://claude.ai/new"
            target="_blank"
            rel="noopener noreferrer"
          >
            Abrir Claude ↗
          </a>
        </div>
      </div>
    </div>
  );
}

        .rec-sigla{width:44px;height:44px;border-radius:4px;background:#0F2542;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#C4A454;flex-shrink:0;text-align:center;line-height:1.2;}
        .rec-info{flex:1;}
        .rec-nome{font-size:14px;font-weight:700;color:#0F2542;margin-bottom:3px;}
        .rec-art{font-size:10px;color:#8A9CB0;}
        .rec-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
        .chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
        .chip-prazo{background:#E8F0F8;color:#0F2542;}
        .chip-sim{background:#E8F5EC;color:#1A6B2F;}
        .chip-nao{background:#FEF3F2;color:#B91C1C;}
        .chip-alerta{background:#FEF9E7;color:#7D5A00;}
        .rec-chevron{font-size:18px;color:#8A9CB0;transition:transform .2s;flex-shrink:0;}
        .rec-chevron.open{transform:rotate(180deg);}
        .rec-body{border-top:1px solid #E8EFF6;padding:16px;display:none;}
        .rec-body.open{display:block;}
        .rec-section{margin-bottom:14px;}
        .rec-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8A9CB0;font-weight:600;margin-bottom:5px;}
        .rec-text{font-size:13px;color:#2C3E55;line-height:1.7;}
        .rec-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
        .rec-pill{background:#F0F4F8;border-radius:3px;padding:8px 12px;flex:1;min-width:110px;}
        .rec-pill-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#8A9CB0;margin-bottom:3px;}
        .rec-pill-val{font-size:13px;font-weight:700;color:#0F2542;}
        .alerta-box{background:#FEF9E7;border-left:3px solid #C4A454;padding:10px 12px;border-radius:0 3px 3px 0;}
        .alerta-text{font-size:12px;color:#7D5A00;font-weight:500;line-height:1.5;}
        .atencao-box{background:#FEF3F2;border-left:3px solid #C0392B;padding:10px 12px;border-radius:0 3px 3px 0;}
        .atencao-text{font-size:12px;color:#B91C1C;font-weight:500;line-height:1.5;}
        .step{display:flex;gap:14px;margin-bottom:14px;}
        .step-n{width:30px;height:30px;border-radius:50%;background:#0F2542;color:#C4A454;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .step-body{flex:1;padding-top:4px;}
        .step-title{font-size:13px;font-weight:700;color:#0F2542;margin-bottom:5px;}
        .step-text{font-size:13px;color:#2C3E55;line-height:1.7;}
        .step-line{width:1px;background:#D0DDE8;margin-left:14px;height:14px;}
        .sessao-card{background:#fff;border:1px solid #D8E2EE;border-radius:4px;padding:14px 16px;margin-bottom:10px;}
        .sessao-turma{font-size:13px;font-weight:700;color:#0F2542;margin-bottom:6px;}
        .sessao-row{display:flex;gap:8px;flex-wrap:wrap;}
        .sessao-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}
        .sessao-dia{background:#E8F0F8;color:#0F2542;}
        .sessao-hora{background:#E8F5EC;color:#1A6B2F;}
        .sessao-sede{background:#F3E8FF;color:#5B2D8E;}
        .virtual-box{background:#fff;border:1px solid #D8E2EE;border-radius:4px;padding:16px;margin-top:14px;}
        .virtual-title{font-size:13px;font-weight:700;color:#0F2542;margin-bottom:10px;}
        .virtual-row{font-size:12px;color:#2C3E55;margin-bottom:5px;display:flex;gap:8px;}
        .virtual-label{font-weight:600;color:#5A7A9A;min-width:140px;}
        .section-title{font-family:'Playfair Display',serif;font-size:18px;color:#0F2542;margin-bottom:4px;}
        .section-sub{font-size:12px;color:#6B82A0;margin-bottom:18px;line-height:1.5;}
        .info-box{background:#fff;border:1px solid #D8E2EE;border-radius:4px;padding:16px;margin-bottom:10px;}
        .info-title{font-size:13px;font-weight:700;color:#0F2542;margin-bottom:8px;}
        .info-text{font-size:13px;color:#2C3E55;line-height:1.75;}
        .nao-cabe{background:#FEF3F2;border-left:3px solid #C0392B;padding:10px 14px;border-radius:0 3px 3px 0;margin-top:10px;}
        .nao-cabe-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#C0392B;font-weight:700;margin-bottom:5px;}
        .nao-cabe-text{font-size:12px;color:#7A2020;line-height:1.6;}
        .verde-box{background:#E8F5EC;border-left:3px solid #1A6B2F;padding:10px 14px;border-radius:0 3px 3px 0;margin-top:10px;}
        .verde-text{font-size:12px;color:#1A4A25;line-height:1.6;}
        .divider{height:1px;background:#D8E2EE;margin:14px 0;}
        .calc-card{background:#fff;border:1px solid #D8E2EE;border-radius:4px;padding:16px;}
        .calc-select{width:100%;border:1px solid #C8D8E8;border-radius:3px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:13px;color:#0F2542;background:#fff;margin-top:6px;cursor:pointer;}
        .calc-select:focus{outline:none;border-color:#0F2542;}
        .calc-tipo-info{margin-top:12px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
        .calc-input{border:1px solid #C8D8E8;border-radius:3px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:13px;color:#0F2542;background:#fff;flex:1;min-width:140px;margin-top:6px;}
        .calc-input:focus{outline:none;border-color:#0F2542;}
        .calc-resultado{background:#0F2542;border-radius:4px;padding:20px;margin-top:14px;}
        .calc-res-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#C4A454;margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:8px;}
        .calc-res-data{font-family:'Playfair Display',serif;font-size:18px;color:#fff;line-height:1.3;margin-bottom:4px;}
        .calc-res-fmt{font-size:13px;color:#8AAAC0;font-weight:600;}
        .btn-elaborar{width:100%;padding:12px 16px;border-radius:3px;border:2px solid #C4A454;background:transparent;color:#7D5A00;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .15s;text-align:center;}
        .btn-elaborar:hover{background:#C4A454;color:#0F2542;}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
        .modal-box{background:#fff;border-radius:6px;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.3);}
        .modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 20px 14px;background:#0F2542;gap:12px;flex-shrink:0;}
        .modal-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#C4A454;margin-bottom:4px;font-weight:600;}
        .modal-titulo{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2;}
        .modal-instrucao{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 14px;background:#F5F8FC;border-bottom:1px solid #E0EAF4;font-size:11px;color:#4A6A90;font-weight:500;flex-shrink:0;}
        .modal-instrucao-n{width:18px;height:18px;border-radius:50%;background:#0F2542;color:#C4A454;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
        .modal-instrucao-sep{color:#C8D8E8;font-size:14px;}
        .modal-textarea{flex:1;resize:none;border:none;padding:16px;font-family:'Inter',sans-serif;font-size:12px;color:#2C3E55;line-height:1.7;overflow-y:auto;background:#FAFCFF;min-height:200px;}
        .modal-textarea:focus{outline:none;}
        .modal-actions{display:flex;gap:10px;padding:14px 16px;border-top:1px solid #E0EAF4;background:#fff;flex-shrink:0;}
        .modal-btn-copiar{flex:1;padding:11px;border-radius:3px;border:none;background:#0F2542;color:#C4A454;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
        .modal-btn-copiar:hover{background:#1A3A5C;}
        .modal-btn-claude{flex:1;padding:11px;border-radius:3px;background:#C4A454;color:#0F2542;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:all .15s;}
        .modal-btn-claude:hover{background:#D4B464;}
        .close-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
        .close-btn:hover{background:rgba(255,255,255,0.3);}
        .links-row{display:flex;gap:8px;flex-wrap:wrap;}
        .btn-link-acao{flex:1;min-width:140px;padding:10px 14px;border-radius:3px;border:none;background:#0F2542;color:#C4A454;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.8px;cursor:pointer;transition:all .15s;text-align:center;}
        .btn-link-acao:hover{background:#1A3A5C;}
        .btn-link-externo{flex:1;min-width:140px;padding:10px 14px;border-radius:3px;border:1px solid #C8D8E8;background:#fff;color:#0F2542;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:4px;}
        .btn-link-externo:hover{background:#F0F4F8;border-color:#0F2542;}
        .links-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
        @media(max-width:480px){.links-grid{grid-template-columns:1fr;}}
        .link-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#F5F8FC;border:1px solid #D8E2EE;border-radius:4px;text-decoration:none;transition:all .15s;cursor:pointer;}
        .link-card:hover{background:#E8F0F8;border-color:#0F2542;}
        .link-card-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center;}
        .link-card-title{font-size:12px;font-weight:700;color:#0F2542;margin-bottom:2px;}
        .link-card-sub{font-size:10px;color:#6B82A0;}
      `}</style>

      {promptAtivo && (
        <ModalPrompt
          titulo={promptAtivo.titulo}
          texto={promptAtivo.texto}
          onClose={() => setPrompt(null)}
        />
      )}

      <div className="hdr">
        <div className="hdr-badge">TJPB · Resolução nº 29/2026</div>
        <div className="hdr-title">Guia das Turmas Recursais</div>
        <div className="hdr-sub">Sistema dos Juizados Especiais da Paraíba</div>
      </div>

      <div className="nav">
        {nav.map(n => (
          <button key={n.id} className={`nav-btn ${section===n.id?"active":""}`} onClick={()=>{setSection(n.id);setExpanded(null);}}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </button>
        ))}
      </div>

      <div className="body">
        {section==="recursos"      && <SecaoRecursos expanded={expanded} setExpanded={setExpanded} onPrompt={setPrompt} />}
        {section==="calcular"      && <Calculadora />}
        {section==="sustentacao"   && <SecaoSustentacao onPrompt={setPrompt} />}
        {section==="sessoes"       && <SecaoSessoes />}
        {section==="uniformizacao" && <SecaoUniformizacao />}
        {section==="preparo"       && <SecaoPreparo />}

        <div style={{ marginTop:28, padding:"12px 0", borderTop:"1px solid #D0DCE8", textAlign:"center" }}>
          <div style={{ fontSize:10, color:"#8A9CB0", lineHeight:1.6 }}>
            Res. TJPB nº 29/2026 · Calendário Oficial TJPB 2026<br />
            Feriados municipais variam por comarca. Consulte sempre o DJe.
          </div>
        </div>
      </div>
    </div>
  );
}

    // Montar o app
    const rootEl = document.getElementById('root');
    const appRoot = ReactDOM.createRoot(rootEl);
    appRoot.render(<GuiaTR />);

    // Remover tela de loading
    document.getElementById('loading').style.display = 'none';
  </script>
</body>
